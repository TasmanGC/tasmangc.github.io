<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="description" content="EXCERPT">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>POST TITLE · TasmanGC</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌏</text></svg>">

    <!-- ============================================================
         POST METADATA — read by scripts/build.py to generate listings
         post:sort uses YYYY-MM format for correct ordering
         ============================================================ -->
    <meta name="post:title"    content="POST TITLE">
    <meta name="post:date"     content="Month YYYY">
    <meta name="post:sort"     content="YYYY-MM">
    <meta name="post:readtime" content="X min read">
    <meta name="post:image"    content="/images/your-image.jpg">
    <meta name="post:excerpt"  content="One or two sentence summary shown on the listing card.">
    <meta name="post:tags"     content="Blog,Tag1,Tag2">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css?family=Nunito+Sans:300,400,600,700,800,900" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/blog-post.css">
  </head>

  <body>
    <div class="progress-bar" id="progress-bar"></div>

    <nav>
      <div class="logo">TasmanGC</div>
      <ul class="menu">
        <div class="menu__item toggle"><span></span></div>
        <li class="menu__item"><a href="/pages/cv.html"            class="link link--dark"><i class="fa fa-file-text"></i> CV</a></li>
        <li class="menu__item"><a href="/pages/blog.html"          class="link link--dark"><i class="fa fa-book"></i> Blog</a></li>
        <li class="menu__item"><a href="/pages/technical.html"     class="link link--dark"><i class="fa fa-flask"></i> Technical</a></li>
        <li class="menu__item"><a href="https://github.com/TasmanGC" target="_blank" class="link link--dark"><i class="fa fa-github"></i> Github</a></li>
        <li class="menu__item"><a href="/index.html"               class="link link--dark"><i class="fa fa-home"></i> Home</a></li>
      </ul>
    </nav>

    <div class="post-hero">
      <img class="post-hero__img" src="/images/your-image.jpg" alt="Alt text">
    </div>

    <header class="post-header">
      <div class="post-header__inner">
        <div class="post-tags">
          <span class="post-tag">Blog</span>
          <span class="post-tag">Tag1</span>
        </div>
        <h1 class="post-title">POST TITLE</h1>
        <div class="post-byline">
          <span class="author">Tasman Gillfeather-Clark</span>
          <span class="sep">·</span>
          <time>Month YYYY</time>
          <span class="sep">·</span>
          <span>X min read</span>
        </div>
      </div>
    </header>

    <main class="post-body">
      <div class="post-body__inner">
        <a href="/pages/blog.html" class="post-back">← All posts</a>

        <h2>First Section</h2>
        <p>
          Opening paragraph.
        </p>

        <h2>Second Section</h2>
        <p>
          Body text.
        </p>

      </div>
    </main>

    <footer class="footer">
      <a href="https://claude.ai" target="_blank" class="link link--light">Written with Claude</a>
    </footer>

    <script>
      const bar = document.getElementById('progress-bar');
      window.addEventListener('scroll', function () {
        const scrolled = window.scrollY;
        const total = document.documentElement.scrollHeight - window.innerHeight;
        bar.style.width = (scrolled / total * 100) + '%';
      });
    </script>
    <script src="/js/site.js"></script>
  </body>
</html>
